<!DOCTYPE html>
<html>
<head>
<title>Mini Block Game</title>
<style>
canvas{
border:2px solid black;
}
</style>
</head>
<body>

<h2>Mini Block Game</h2>
<canvas id="game" width="200" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let block = {x:90,y:0,size:20};

function draw(){
ctx.clearRect(0,0,200,400);
ctx.fillRect(block.x,block.y,block.size,block.size);
}

function update(){
block.y += 20;
if(block.y > 380){
block.y = 0;
block.x = Math.floor(Math.random()*10)*20;
}
}

setInterval(()=>{
update();
draw();
},500);

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowLeft") block.x -=20;
if(e.key=="ArrowRight") block.x +=20;
});
</script>

</body>
</html>
